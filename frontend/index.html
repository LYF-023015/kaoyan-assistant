<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考研助手</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <!-- 左侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                    <span>考研助手</span>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    新建对话
                </button>
            </div>
            <div class="sidebar-history" id="sidebarHistory">
                <div class="history-title">历史会话</div>
                <ul class="history-list" id="historyList"></ul>
            </div>
            <div class="sidebar-files" id="sidebarFiles">
                <div class="files-header">
                    <span class="files-title">知识库文件</span>
                    <button class="files-refresh" id="refreshFilesBtn" title="刷新">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                    </button>
                </div>
                <div class="file-list" id="fileList">
                    <div style="padding: 8px; color: var(--text-tertiary); font-size: 12px;">加载中...</div>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="subject-select-wrapper">
                    <label>学科</label>
                    <select id="subjectSelect">
                        <option value="全部">全部学科</option>
                        <option value="政治">政治</option>
                        <option value="英语">英语</option>
                        <option value="数学">数学</option>
                        <option value="自动控制原理">自动控制原理</option>
                    </select>
                </div>
                <div class="toolbar">
                    <button id="themeToggle" title="切换主题">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/>
                            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                        </svg>
                    </button>
                    <button id="uploadBtn" title="上传资料">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </button>
                    <button id="indexBtn" title="重建索引">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- 主区域 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="main-header">
                <div class="header-title" id="headerTitle">考研智能助手</div>
                <div class="header-model" id="headerModel">GLM-4</div>
            </header>

            <!-- 聊天区域 -->
            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-logo">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <h1>考研助手</h1>
                    <p class="welcome-subtitle">基于 M3E + BM25 双路召回 · BGE-Reranker 重排 · ReAct Agent</p>
                    <div class="welcome-cards">
                        <div class="welcome-card" data-prompt="帮我总结考研政治马克思主义基本原理的核心考点">
                            <div class="card-icon">📖</div>
                            <div class="card-text">政治核心考点总结</div>
                        </div>
                        <div class="welcome-card" data-prompt="解释自动控制原理中根轨迹的绘制方法">
                            <div class="card-icon">⚙️</div>
                            <div class="card-text">控制原理概念讲解</div>
                        </div>
                        <div class="welcome-card" data-prompt="考研数学极限计算的常用技巧有哪些？">
                            <div class="card-icon">📐</div>
                            <div class="card-text">数学解题技巧</div>
                        </div>
                        <div class="welcome-card" data-prompt="帮我分析2025年考研英语阅读理解的命题趋势">
                            <div class="card-icon">🔤</div>
                            <div class="card-text">英语命题趋势分析</div>
                        </div>
                    </div>
                </div>
                <div class="messages-wrapper" id="messagesWrapper"></div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea
                        id="messageInput"
                        placeholder="输入考研问题，Shift+Enter 换行..."
                        rows="1"
                    ></textarea>
                    <div class="input-actions">
                        <label class="web-search-toggle">
                            <input type="checkbox" id="webSearchToggle" checked>
                            <span>联网搜索</span>
                        </label>
                        <button class="send-btn" id="sendBtn" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="input-footer">
                    考研助手基于本地知识库和联网搜索提供智能问答，答案仅供参考
                </div>
            </div>
        </main>
    </div>

    <!-- 隐藏的文件上传输入 -->
    <input type="file" id="fileInput" accept=".txt,.md,.pdf,.docx" style="display:none" multiple>

    <!-- 提示 Toast -->
    <div id="toast" class="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
